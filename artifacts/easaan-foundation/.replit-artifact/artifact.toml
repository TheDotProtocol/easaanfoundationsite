kind = "web"
previewPath = "/"
title = "The Easaan Foundation"
version = "1.0.0"
id = "artifacts/easaan-foundation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23425

[services.development]
run = "pnpm --filter @workspace/easaan-foundation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/easaan-foundation", "run", "build" ]
publicDir = "artifacts/easaan-foundation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23425"
BASE_PATH = "/"
